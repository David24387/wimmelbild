<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Euromaster Safety Challenge</title>
    <style>
        :root {
            --euromaster-blue: #005596;
            --euromaster-red: #e2001a;
            --euromaster-yellow: #ffdd00;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f4f7f9; margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
        
        #login-screen, #thank-you-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.96); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        #thank-you-screen { display: none; background: var(--euromaster-blue); }
        .form-box, .thank-you-box { background: white; color: #333; padding: 25px; border-radius: 12px; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        .btn-main { background: var(--euromaster-blue); color: white; border: none; padding: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1.1rem; }

        .header { background: var(--euromaster-blue); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }

        .game-wrapper { position: relative; width: 100%; max-width: 1000px; margin: 0 auto; line-height: 0; background: #fff; touch-action: manipulation; }
        img#main-image { width: 100%; height: auto; display: block; }

        /* Hotspots: Jetzt mit Prozenten für perfekte Skalierung */
        .hotspot { 
            position: absolute; 
            z-index: 10; 
            width: 8%; /* Dynamische Breite basierend auf Bildgröße */
            padding-bottom: 8%; /* Macht es quadratisch/rund */
            border: 3px solid transparent; 
            border-radius: 50%;
            transform: translate(-50%, -50%); 
            cursor: pointer;
        }
        
        .hotspot.found { border-color: var(--euromaster-red) !important; background: rgba(226, 0, 26, 0.4); box-shadow: 0 0 15px var(--euromaster-red); }

        #info-popup { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--euromaster-yellow); color: #333; padding: 15px; border-bottom: 4px solid var(--euromaster-red); border-radius: 10px; width: 90%; max-width: 500px; display: none; z-index: 1500; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #finish-area { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .btn-finish { background: #28a745; color: white; border: none; padding: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="form-box">
        <img src="LOGO_ERM_H_DE_Reifen-Werkstatt-Autoglas_RGB.png" style="width: 200px; height: auto; margin-bottom: 20px;" alt="Logo">
        <h2 style="margin: 0; color: var(--euromaster-blue);">Safety Challenge</h2>
        <input type="text" id="username" placeholder="Dein Name">
        <input type="email" id="useremail" placeholder="Deine E-Mail">
        <button class="btn-main" onclick="startGame()">JETZT STARTEN</button>
    </div>
</div>

<div id="thank-you-screen">
    <div class="thank-you-box">
        <h2 style="color: var(--euromaster-blue);">Vielen Dank!</h2>
        <p>Dein Ergebnis wurde gespeichert.</p>
        <button class="btn-main" onclick="location.reload()">ZURÜCK ZUM START</button>
    </div>
</div>

<div class="header">
    <div>Gefunden: <span id="score">0</span> / 7</div>
    <div id="timer">0.0s</div>
</div>

<div id="info-popup">
    <div id="popup-title" style="color: var(--euromaster-red); text-transform: uppercase;"></div>
    <div id="popup-text"></div>
</div>

<div class="game-wrapper" id="game-container">
    <img src="wimmel.jpg" id="main-image">

    <div class="hotspot" style="top: 55%; left: 58%;" data-title="Lebensgefahr" data-info="Mitarbeiter unter schwebender Last!"></div>
    <div class="hotspot" style="top: 75%; left: 45%;" data-title="Rutschgefahr" data-info="Öl auf dem Boden!"></div>
    <div class="hotspot" style="top: 38%; left: 8%;" data-title="Fluchtweg" data-info="Notausgang durch Reifen blockiert!"></div>
    <div class="hotspot" style="top: 78%; left: 65%;" data-title="PSA fehlt" data-info="Keine Sicherheitsschuhe!"></div>
    <div class="hotspot" style="top: 48%; left: 38%;" data-title="Hebebühne" data-info="Tragarm falsch angesetzt!"></div>
    <div class="hotspot" style="top: 38%; left: 28%;" data-title="Notaus" data-info="Notausschalter verdeckt/blockiert!"></div>
    <div class="hotspot" style="top: 42%; left: 83%;" data-title="Ablenkung" data-info="Handy am Arbeitsplatz!"></div>
</div>

<div id="finish-area">
    <button class="btn-finish" onclick="finishGame()">ERGEBNIS ABSENDEN</button>
</div>

<script>
    let startTime, timerInterval;
    let foundCount = 0;
    const totalFaults = 7;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyj8W9zYisZ23K287oN95Vw5Oq5vUeBvR9y_vB9y/exec'; 

    function startGame() {
        if(document.getElementById('username').value.length > 2) {
            document.getElementById('login-screen').style.display = 'none';
            startTime = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(1) + "s";
            }, 100);
        } else { alert("Bitte Name eingeben!"); }
    }

    async function finishGame() {
        const btn = document.querySelector('.btn-finish');
        btn.innerText = "Wird gesendet...";
        btn.disabled = true;
        const data = {
            name: document.getElementById('username').value,
            email: document.getElementById('useremail').value,
            score: foundCount,
            time: ((Date.now() - startTime) / 1000).toFixed(1)
        };
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});
            document.getElementById('thank-you-screen').style.display = 'flex';
        } catch (e) { alert("Fehler beim Senden."); btn.disabled = false; }
    }

    document.querySelectorAll('.hotspot').forEach(spot => {
        spot.addEventListener('click', function() {
            if (!this.classList.contains('found')) {
                this.classList.add('found');
                foundCount++;
                document.getElementById('score').innerText = foundCount;
                const popup = document.getElementById('info-popup');
                document.getElementById('popup-title').innerText = this.getAttribute('data-title');
                document.getElementById('popup-text').innerText = this.getAttribute('data-info');
                popup.style.display = 'block';
                if(foundCount >= 5) document.getElementById('finish-area').style.display = 'block';
                if(foundCount === totalFaults) clearInterval(timerInterval);
                setTimeout(() => { popup.style.display = 'none'; }, 3000);
            }
        });
    });
</script>
</body>
</html>
