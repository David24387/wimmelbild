<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euromaster Safety Challenge</title>
    <style>
        :root {
            --euromaster-blue: #005596;
            --euromaster-red: #e2001a;
            --euromaster-yellow: #ffdd00;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 20px; }
        
        /* Login Screen */
        #login-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .form-box { background: white; color: #333; padding: 30px; border-radius: 12px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .btn-main { background: var(--euromaster-blue); color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; font-size: 1.1rem; transition: background 0.2s; }
        .btn-main:hover { background: var(--euromaster-red); }

        /* Game UI */
        .header { background: var(--euromaster-blue); color: white; padding: 15px; border-radius: 8px 8px 0 0; max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-around; align-items: center; font-weight: bold; }
        .container { position: relative; display: inline-block; background: #fff; line-height: 0; border: 5px solid var(--euromaster-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        img#main-image { max-width: 1000px; height: auto; display: block; }

        /* Hotspots mit Klick-Toleranz */
        .hotspot { 
            position: absolute; 
            border: 3px solid transparent; 
            border-radius: 20%; 
            z-index: 10; 
            cursor: pointer;
            box-sizing: content-box;
            padding: 20px; /* Großzügige Toleranz */
            transform: translate(-20px, -20px); 
        }
        .hotspot.found { 
            border-color: var(--euromaster-red) !important; 
            background: rgba(226, 0, 26, 0.3); 
            box-shadow: 0 0 20px var(--euromaster-red); 
        }

        /* Infobox Popup */
        #info-popup { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--euromaster-yellow); color: #333; padding: 20px; 
            border-left: 10px solid var(--euromaster-red); border-radius: 8px; 
            width: 80%; max-width: 600px; display: none; z-index: 500; font-weight: bold; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Finish Button Bereich */
        #finish-area { display: none; margin: 20px auto; max-width: 1000px; }
        .btn-finish { background: #28a745; color: white; border: none; padding: 20px; font-size: 1.3rem; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="form-box">
        <img src="LOGO_ERM_H_DE_Reifen-Werkstatt-Autoglas_RGB.png" style="width: 100%; max-width: 250px; height: auto; margin-bottom: 20px;" alt="Euromaster Logo">
        <h2 style="margin-top: 0; color: var(--euromaster-blue);">Safety Challenge</h2>
        <p>Finde die 7 Sicherheitsmängel!</p>
        <input type="text" id="username" placeholder="Vor- und Nachname" required>
        <input type="email" id="useremail" placeholder="Euromaster E-Mail" required>
        <button class="btn-main" onclick="startGame()">Wettbewerb starten</button>
    </div>
</div>

<div class="header">
    <div>Gefunden: <span id="score">0</span> / 7</div>
    <div id="timer">Zeit: 0.0s</div>
</div>

<div class="container" id="game-area">
    <img src="wimmel.jpg" id="main-image" alt="Werkstatt">

    <div class="hotspot" style="top: 48%; left: 52%; width: 8%; height: 35%;" data-title="LEBENSGEFAHR!" data-info="Mitarbeiter steht unter schwebender Last. Absolutes No-Go!"></div>
    
    <div class="hotspot" style="top: 78%; left: 38%; width: 12%; height: 10%;" data-title="RUTSCHGEFAHR!" data-info="Öl auf dem Boden. Sturzgefahr mit Verletzungsrisiko."></div>
    
    <div class="hotspot" style="top: 30%; left: 2%; width: 12%; height: 50%;" data-title="FLUCHTWEG BLOCKIERT!" data-info="Reifen stapeln sich vor der Notausgangstür."></div>
    
    <div class="hotspot" style="top: 75%; left: 63%; width: 8%; height: 10%;" data-title="PSA FEHLT!" data-info="Der Mitarbeiter trägt Sneaker statt Sicherheitsschuhen."></div>
    
    <div class="hotspot" style="top: 45%; left: 33%; width: 10%; height: 5%;" data-title="TECHNIK-FEHLER!" data-info="Tragarme der Bühne sind falsch am Fahrzeug angesetzt."></div>
    
    <div class="hotspot" style="top: 30%; left: 25%; width: 5%; height: 15%;" data-title="NOT-AUS BLOCKIERT!" data-info="Der Notausschalter ist durch Kabel und Schläuche verdeckt."></div>
    
    <div class="hotspot" style="top: 35%; left: 80%; width: 6%; height: 30%;" data-title="ABLENKUNG!" data-info="Handynutzung lenkt massiv von der Arbeitssicherheit ab."></div>
</div>

<div id="finish-area">
    <button class="btn-finish" onclick="finishGame()">Ergebnis absenden & Wettbewerb beenden</button>
</div>

<div id="info-popup">
    <div id="popup-title" style="font-size: 1.2rem; color: var(--euromaster-red); text-transform: uppercase;"></div>
    <div id="popup-text" style="margin-top: 5px; line-height: 1.4;"></div>
</div>

<script>
    let startTime, timerInterval;
    let foundCount = 0;
    const totalFaults = 7;
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyC8teTyLoK97pdTqLbLegVDYZvd-f7CLmwdQRYz3tgLY9a8PolSI03nLf-ZmLyw9E/exec'; // <-- BITTE HIER DEINEN GOOGLE LINK EINSETZEN

    function startGame() {
        const name = document.getElementById('username').value;
        const email = document.getElementById('useremail').value;
        if(name.trim() !== "" && email.includes("@")) {
            document.getElementById('login-screen').style.display = 'none';
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 100);
        } else {
            alert("Bitte gib deinen Namen und deine Euromaster Mail ein!");
        }
    }

    function updateTimer() {
        let elapsed = (Date.now() - startTime) / 1000;
        document.getElementById('timer').innerText = "Zeit: " + elapsed.toFixed(1) + "s";
    }

    async function finishGame() {
        const finalTime = (Date.now() - startTime) / 1000;
        const name = document.getElementById('username').value;
        const email = document.getElementById('useremail').value;

        try {
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: name, email: email, score: foundCount, time: finalTime })
            });
        } catch (e) { console.error(e); }

        alert("Fertig! Deine Zeit: " + finalTime + "s. Dein Ergebnis wurde gespeichert.");
        location.reload(); 
    }

    document.querySelectorAll('.hotspot').forEach(spot => {
        spot.addEventListener('click', function() {
            if (!this.classList.contains('found')) {
                this.classList.add('found');
                foundCount++;
                document.getElementById('score').innerText = foundCount;
                
                const popup = document.getElementById('info-popup');
                document.getElementById('popup-title').innerText = this.getAttribute('data-title');
                document.getElementById('popup-text').innerText = this.getAttribute('data-info');
                popup.style.display = 'block';

                // Erscheint ab 5 gefundenen Fehlern
                if(foundCount >= 5) {
                    document.getElementById('finish-area').style.display = 'block';
                }

                if(foundCount === totalFaults) {
                    clearInterval(timerInterval);
                    setTimeout(() => alert("Alle 7 Fehler gefunden! Sende jetzt dein Ergebnis ab."), 300);
                }
            }
        });
    });
</script>
</body>
</html>
